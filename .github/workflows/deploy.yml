# ─────────────────────────────────────────────────────────────────────────────
# Spring Design Agent — CI/CD Pipeline
# ─────────────────────────────────────────────────────────────────────────────
# Builds the Docker image, runs tests, and deploys to the target environment
# via a self-hosted runner.
#
# Triggers:
#   push to main        → test + build + deploy to production
#   pull request         → test + build (no deploy)
#   workflow_dispatch    → manual deploy to any environment
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Spring Design Agent

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Test — run lint, type check, and pytest
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: springs_pass
          POSTGRES_DB: springs_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U postgres
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check app/ tests/

      - name: Type check with mypy
        run: mypy app/

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing
        env:
          POSTGRES_URL: postgresql+asyncpg://postgres:springs_pass@localhost:5432/springs_db

  # ───────────────────────────────────────────────────────────────────────────
  # Build — build and push Docker image
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ───────────────────────────────────────────────────────────────────────────
  # Deploy — deploy to self-hosted runner environment
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy with Docker Compose
        run: |
          # Replace the image tag in docker-compose.yml with the pulled version
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest docker compose -f docker-compose.yml up -d --force-recreate api
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Health check
        run: |
          sleep 10
          curl -f http://localhost:8000/health || exit 1

      - name: Run database migrations
        run: |
          docker exec springs_api alembic upgrade head
