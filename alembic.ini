# alembic.ini — Spring Design Agent
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = app/db/migrations

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for generated migration timestamps
timezone = UTC

# Max length of auto-generated migration slug
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without source
sourceless = false

# Version path separator (use "os" for OS default, ":" for Unix, ";" for Win32)
version_path_separator = os

# Version locations — single location for this project
version_locations = %(here)s/app/db/migrations/versions

# The output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# SQLAlchemy URL — overridden at runtime by env.py from application settings
sqlalchemy.url = postgresql://postgres:password@localhost:5432/springs_db


# ─────────────────────────────────────────────────────────────────────────────
# Logging configuration (used by Alembic CLI only)
# ─────────────────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
